name: forecast

# Around 4am Rhode Island time, daily. Twice, deliberately.
#
# GitHub cron is UTC-only and has no DST awareness, so we fire at both 08:17 and
# 09:17 UTC. One of those is 4:17am local and the other is an hour off, and we
# do not care which: BOTH build. Rebuilding is safe -- forecast.json is
# overwritten, the calibration log is keyed by date so the day's row is replaced
# rather than duplicated (forecast.py log_calibration), and an unchanged tree
# commits nothing. The second firing is simply a free retry an hour later.
#
# There used to be a gate here that skipped any run whose local hour was not
# exactly 5. It made the pipeline fragile in the one way it could not afford:
# scheduled runs are best-effort, GitHub delivers them LATE under load, and a
# late run is not a wrong run. On 2026-07-14 both firings arrived 38 and 89
# minutes behind, the gate read 6am and 7am, and skipped them both -- two green
# runs, no forecast, a silent miss. Idempotence is a better defence than a
# clock check.
#
# :17 and not :00 -- the top of the hour is the most contended minute on the
# platform, and runs there get delayed or DROPPED. We asked for 09:00 on
# 2026-07-13 and got nothing at all: no run, no failure, no email. It is still
# best-effort, which is why staleness.yml watches the output and shouts if a
# build goes missing.
on:
  schedule:
    - cron: '17 8 * * *'    # 4:17am EDT / 3:17am EST
    - cron: '17 9 * * *'    # 5:17am EDT / 4:17am EST
  workflow_dispatch:        # and on demand

permissions:
  contents: write
  pull-requests: write      # the compounding step opens PRs; it never merges them

concurrency:
  group: forecast
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build forecast
        run: python3 .claude/skills/surf-forecast/forecast.py

      # GitHub Pages serves the JS with max-age=600 and index.html has no version
      # token, so after a deploy browsers keep running the OLD script -- a shipped
      # fix stays invisible. Stamp the src with the file's own content hash: it
      # changes only when the JS changes, and then it busts immediately.
      - name: Cache-bust forecast-panel.js
        run: |
          test -s index.html || { echo "index.html is EMPTY -- refusing to build"; exit 1; }
          H=$(md5sum forecast-panel.js | cut -c1-8)
          sed -i -E "s|forecast-panel\.js(\?v=[a-f0-9]+)?|forecast-panel.js?v=$H|" index.html
          # a missing script tag means the app cannot boot -- fail the build, don't ship it
          grep -q "surf-forecast" index.html || { echo "index.html lost <surf-forecast>"; exit 1; }
          grep -o 'forecast-panel.js?v=[a-f0-9]*' index.html

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/forecast.json data/calibration-log.jsonl index.html
          if git diff --staged --quiet; then
            echo "no change"
          else
            git commit -m "Forecast $(TZ=America/New_York date +%Y-%m-%d)"
            git push
          fi

  # ------------------------------------------------------------------ compound
  # The compounding step. Every day the forecast job logs what the human (Warm
  # Winds) called beside what we called. This job reads that accumulating history
  # and asks: is the model systematically drifting from the human?
  #
  # If it is, it opens a PR proposing a new SIZE_BIAS, with the evidence attached.
  # It NEVER merges, and it never edits main. Deliberately:
  #   * these constants are already unsourced guesses -- a robot silently tuning
  #     guesses against a small sample produces numbers nobody can defend
  #   * one report a day is a small, autocorrelated sample; a single hurricane week
  #     could yank a constant hard. Hence: >=14 days required, 15% step cap, and a
  #     median (not a mean) so one wild day cannot swing the fit
  #   * a size disagreement can mean the model is wrong OR the threshold is wrong,
  #     and those need opposite fixes. A human decides which.
  compound:
    needs: forecast
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Review the model against the human
        id: cal
        run: |
          python3 .claude/skills/surf-forecast/calibrate.py | tee report.txt
          python3 .claude/skills/surf-forecast/calibrate.py --json > cal.json
          echo "propose=$(python3 -c "import json;print(str(json.load(open('cal.json'))['propose']).lower())")" >> "$GITHUB_OUTPUT"

      - name: Open a PR proposing the correction
        if: steps.cal.outputs.propose == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW=$(python3 -c "import json;print(json.load(open('cal.json'))['proposedBias'])")
          OLD=$(python3 -c "import json;print(json.load(open('cal.json'))['currentBias'])")
          BR="calibrate/size-bias-$NEW"

          # don't stack duplicate PRs if one is already open for this value
          if gh pr list --head "$BR" --state open --json number | grep -q number; then
            echo "a PR for this correction is already open"; exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BR"
          sed -i -E "s/^SIZE_BIAS = .*/SIZE_BIAS = $NEW/" .claude/skills/surf-forecast/forecast.py
          git add .claude/skills/surf-forecast/forecast.py
          git commit -m "Calibrate: SIZE_BIAS $OLD -> $NEW"
          git push -u origin "$BR"

          {
            echo "The model has drifted from the human report. This is a **proposal**, not a fix."
            echo
            echo '```'
            cat report.txt
            echo '```'
            echo
            echo "**Before merging, ask:**"
            echo "- Is the model wrong, or is Warm Winds' band just coarse (they report \`0-1 ft\`, we report a number)?"
            echo "- Is the sample dominated by flat days? A fortnight of knee-high teaches almost nothing about overhead."
            echo "- Does the direction match your own sessions?"
            echo
            echo "If the disagreement is about the *verdict* rather than the *size*, this is the wrong lever — the worth-it threshold is, and that is a taste call, not a calibration."
          } > body.md

          gh pr create --title "Calibrate: SIZE_BIAS $OLD -> $NEW" --body-file body.md --base main --head "$BR"

      - name: Nothing to propose
        if: steps.cal.outputs.propose != 'true'
        run: cat report.txt
