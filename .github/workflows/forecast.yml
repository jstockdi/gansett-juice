name: forecast

# 5am Rhode Island time, daily.
#
# GitHub cron is UTC-only and has NO DST awareness, so a single UTC time drifts
# an hour twice a year. We fire at BOTH 09:00 UTC (= 5am EDT) and 10:00 UTC
# (= 5am EST) and let the job itself decide which one is really 5am local.
# The other firing exits immediately. This is the same DST care the forecast
# pipeline takes with tide data -- see docs/forecast-agent.md §4.
on:
  schedule:
    - cron: '0 9 * * *'    # 5am EDT (summer)
    - cron: '0 10 * * *'   # 5am EST (winter)
  workflow_dispatch:       # and on demand

permissions:
  contents: write

concurrency:
  group: forecast
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Is it actually 5am in Rhode Island?
        id: gate
        run: |
          HOUR=$(TZ=America/New_York date +%-H)
          echo "local hour: $HOUR"
          if [ "$HOUR" != "5" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "not 5am local (DST twin firing) — skipping"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build forecast
        if: steps.gate.outputs.run == 'true'
        run: python3 .claude/skills/surf-forecast/forecast.py

      - name: Commit if changed
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/forecast.json data/calibration-log.jsonl
          if git diff --staged --quiet; then
            echo "no change"
          else
            git commit -m "Forecast $(TZ=America/New_York date +%Y-%m-%d)"
            git push
          fi
