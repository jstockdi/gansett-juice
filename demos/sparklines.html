<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Gansett Juice — Option B: per-spot sparklines + drivers</title>
<style>
  :root {
    --surface-0: #111110;
    --surface-1: #1a1a19;
    --surface-2: #22221f;
    --text-primary: #ffffff;
    --text-secondary: #c3c2b7;
    --text-muted: #86857c;
    --hairline: #34342f;
    --score: #6da7ec;          /* sequential blue, the one hue for "quality" */
    --swell: #3987e5;          /* categorical slot 1 */
    --wind:  #199e70;          /* categorical slot 2 */
    --tide:  #c98500;          /* categorical slot 3 */
    --warn:  #fab219;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--surface-0); color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased; }
</style>
</head>
<body>
<surf-sparkstack></surf-sparkstack>

<script>
/* ==================================================================== *
 *  Option B — per-spot sparkline stack over shared driver charts       *
 *                                                                      *
 *  The question this one answers that a heatmap can't: WHY.            *
 *  Every spot's score line sits above the same three driving variables *
 *  on the same x-axis, so you can see the swell arrive, the wind swing *
 *  offshore, and the tide drain -- and watch the spots respond         *
 *  differently to the identical inputs.                                *
 *                                                                      *
 *  Non-colour channels: each spot's peak is direct-labelled with a     *
 *  number; the "holding it back" factor is spelled out in words; the   *
 *  good-conditions band is a dashed rule, not a hue.                   *
 * ==================================================================== */

const DATASETS = [
  { id: 'swell', label: 'Hurricane Lee (Sept 2023)', url: '../data/forecast-example-swell.json' },
  { id: 'live',  label: 'Live 5-day forecast',       url: '../data/forecast.json' },
];
const LIMIT_LABEL = { size: 'size', wind: 'wind', period: 'period', tide: 'tide', none: 'nothing' };
const REGION = id =>
  ['narragansett-town-beach', 'monahans-dock'].includes(id) ? 'narragansett'
  : ['point-judith-east', 'point-judith-south', 'k38', 'camp-cronin'].includes(id) ? 'point-judith'
  : 'matunuck';

const W = 760, PAD = 4;

/* build an SVG path; nulls break the line rather than being drawn as zero --
   missing data must never render as "bad". */
function path(vals, h, lo, hi) {
  const n = vals.length, sx = W / (n - 1);
  let d = '', pen = false;
  vals.forEach((v, i) => {
    if (v === null || v === undefined) { pen = false; return; }
    const y = h - PAD - (v - lo) / (hi - lo || 1) * (h - PAD * 2);
    d += (pen ? 'L' : 'M') + (i * sx).toFixed(1) + ' ' + y.toFixed(1) + ' ';
    pen = true;
  });
  return d.trim();
}
function area(vals, h, lo, hi) {
  const p = path(vals, h, lo, hi);
  if (!p) return '';
  const n = vals.length, sx = W / (n - 1);
  const first = vals.findIndex(v => v !== null);
  let last = n - 1; while (last > 0 && vals[last] === null) last--;
  return `${p} L ${(last * sx).toFixed(1)} ${h} L ${(first * sx).toFixed(1)} ${h} Z`;
}

class SurfSparkStack extends HTMLElement {
  constructor() {
    super();
    this.attachShadow({ mode: 'open' });
    this._ds = DATASETS[0];
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: block; padding: 18px 16px 40px; max-width: 900px; margin: 0 auto; }
        h1 { font-size: 17px; margin: 0 0 2px; }
        .sub { color: var(--text-muted); font-size: 12.5px; margin: 0 0 14px; }
        select { background: var(--surface-2); color: var(--text-primary);
          border: 1px solid var(--hairline); border-radius: 8px; padding: 6px 10px;
          font: inherit; font-size: 12.5px; margin-bottom: 12px; }
        .note { font-size: 12px; color: var(--text-secondary); background: var(--surface-1);
          border: 1px solid var(--hairline); border-left: 3px solid var(--swell);
          border-radius: 6px; padding: 8px 10px; margin-bottom: 14px; line-height: 1.45; }

        .card { background: var(--surface-1); border: 1px solid var(--hairline);
          border-radius: 10px; overflow: hidden; }
        .spot { display: grid; grid-template-columns: 172px 1fr; align-items: center;
          border-bottom: 1px solid var(--hairline); }
        .spot:last-child { border-bottom: 0; }
        .meta { padding: 8px 10px; border-right: 1px solid var(--hairline); min-width: 0; }
        .nm { font-size: 12.5px; font-weight: 600; line-height: 1.3; }
        .pk { font-size: 11.5px; color: var(--text-secondary); margin-top: 2px; }
        .pk b { color: var(--text-primary); font-size: 15px; font-variant-numeric: tabular-nums; }
        .lim { font-size: 10.5px; color: var(--text-muted); margin-top: 1px; }
        .plot { position: relative; }
        svg { display: block; width: 100%; height: 100%; }

        .drivers { margin-top: 16px; }
        .drv { display: grid; grid-template-columns: 172px 1fr; align-items: center;
          border-bottom: 1px solid var(--hairline); }
        .drv:last-child { border-bottom: 0; }
        .dnm { padding: 8px 10px; font-size: 12px; border-right: 1px solid var(--hairline);
          display: flex; align-items: center; gap: 7px; color: var(--text-secondary); }
        .chip { width: 9px; height: 9px; border-radius: 2px; flex: 0 0 auto; }

        .cursor { position: absolute; top: 0; bottom: 0; width: 1px; background: #fff;
          opacity: 0; pointer-events: none; }
        .hit { position: absolute; inset: 0; cursor: crosshair; }

        .tip { position: fixed; z-index: 10; pointer-events: none; opacity: 0;
          transition: opacity .1s; background: #000; border: 1px solid #45453f;
          border-radius: 8px; padding: 9px 11px; font-size: 12px; line-height: 1.5;
          box-shadow: 0 8px 28px rgba(0,0,0,.7); }
        .tip.on { opacity: 1; }
        .tip .k { color: var(--text-muted); display: inline-block; min-width: 46px; }
        .days { display: grid; font-size: 10.5px; color: var(--text-muted);
          margin-left: 172px; padding: 5px 0 0; }
      </style>

      <h1>Option B — per-spot sparklines over the drivers</h1>
      <p class="sub">Same x-axis throughout: watch the spots disagree about identical inputs.</p>
      <select id="ds"></select>
      <div class="note" id="note"></div>
      <div class="card" id="spots"></div>
      <div class="days" id="days"></div>
      <div class="card drivers" id="drivers"></div>
      <div class="tip" id="tip"></div>`;

    const sel = this.shadowRoot.getElementById('ds');
    sel.innerHTML = DATASETS.map(d => `<option value="${d.id}">${d.label}</option>`).join('');
    sel.addEventListener('change', e => {
      this._ds = DATASETS.find(d => d.id === e.target.value);
      this.load();
    });
    this._tip = this.shadowRoot.getElementById('tip');
  }

  connectedCallback() { this.load(); }

  async load() {
    this._d = await (await fetch(this._ds.url)).json();
    this.render();
  }

  render() {
    const d = this._d, n = d.times.length;
    this.shadowRoot.getElementById('note').innerHTML = d.historical
      ? `<b>Replay, not a forecast.</b> ${d.historical.note}`
      : `<b>Live forecast.</b> Flat lines here mean a flat ocean, not a broken model.`;

    const H = 44;
    // spots, ranked by their peak so the good ones surface first
    const ranked = [...d.spots].sort((a, b) => {
      const p = id => Math.max(...d.scores[id].map(c => c.s ?? -1));
      return p(b.id) - p(a.id);
    });

    this.shadowRoot.getElementById('spots').innerHTML = ranked.map(sp => {
      const row = d.scores[sp.id];
      const vals = row.map(c => c.s);
      const peak = Math.max(...vals.filter(v => v !== null), 0);
      const pi = vals.indexOf(peak);
      const when = peak > 0
        ? new Date(d.times[pi]).toLocaleString('en-US', { weekday: 'short', hour: 'numeric', hour12: true })
        : '—';
      // the most common thing holding this spot back, in words -- not a colour
      const tally = {};
      row.forEach(c => { if (c.s !== null && c.s < 60) tally[c.limiting] = (tally[c.limiting] || 0) + 1; });
      const worst = Object.entries(tally).sort((a, b) => b[1] - a[1])[0];
      const sx = W / (n - 1);
      const caution = row.some(c => c.caution);

      return `<div class="spot">
        <div class="meta">
          <div class="nm">${sp.name}</div>
          <div class="pk"><b>${peak}</b> peak · ${when}</div>
          <div class="lim">${peak === 0 ? 'never breaks in this window'
            : worst ? 'usually limited by ' + LIMIT_LABEL[worst[0]] : 'clean throughout'}
            ${caution ? '<span style="color:var(--warn)"> ⚠</span>' : ''}</div>
        </div>
        <div class="plot" style="height:${H}px">
          <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
            <line x1="0" x2="${W}" y1="${H - PAD - 0.6 * (H - PAD * 2)}"
                  y2="${H - PAD - 0.6 * (H - PAD * 2)}"
                  stroke="#3a3a35" stroke-width="1" stroke-dasharray="3 3"/>
            <path d="${area(vals, H, 0, 100)}" fill="${'var(--score)'}" opacity=".22"/>
            <path d="${path(vals, H, 0, 100)}" fill="none" stroke="var(--score)"
                  stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
            ${peak > 0 ? `<circle cx="${(pi * sx).toFixed(1)}"
                  cy="${(H - PAD - peak / 100 * (H - PAD * 2)).toFixed(1)}"
                  r="3.5" fill="#fff" stroke="var(--surface-1)" stroke-width="1.5"/>` : ''}
          </svg>
          <div class="cursor"></div><div class="hit" data-spot="${sp.id}"></div>
        </div>
      </div>`;
    }).join('');

    // shared drivers, same x-axis, three validated categorical hues
    const swell = d.conditions.swell.map(c => c && c.h);
    const period = d.conditions.swell.map(c => c && c.t);
    const wind = d.conditions.wind.matunuck.map(c => c && c.spd);
    const tide = d.conditions.tide.map(c => c && c.ft);
    const rng = v => { const f = v.filter(x => x != null); return [Math.min(...f), Math.max(...f)]; };
    const DH = 40;
    const drv = (label, vals, hue, unit) => {
      const [lo, hi] = rng(vals);
      return `<div class="drv">
        <div class="dnm"><span class="chip" style="background:${hue}"></span>${label}
          <span style="color:var(--text-muted);margin-left:auto;font-size:10.5px">
            ${lo.toFixed(1)}–${hi.toFixed(1)}${unit}</span></div>
        <div class="plot" style="height:${DH}px">
          <svg viewBox="0 0 ${W} ${DH}" preserveAspectRatio="none">
            <path d="${path(vals, DH, lo, hi)}" fill="none" stroke="${hue}" stroke-width="2"
                  stroke-linejoin="round" stroke-linecap="round"/>
          </svg>
          <div class="cursor"></div><div class="hit" data-drv="1"></div>
        </div>
      </div>`;
    };
    this.shadowRoot.getElementById('drivers').innerHTML =
      drv('Swell height', swell, 'var(--swell)', ' ft') +
      drv('Swell period', period, 'var(--swell)', ' s') +
      drv('Wind speed', wind, 'var(--wind)', ' kt') +
      drv('Tide', tide, 'var(--tide)', ' ft');

    // day ticks
    const days = [];
    d.times.forEach((t, i) => {
      const day = t.slice(0, 10);
      if (!days.length || days.at(-1).day !== day) days.push({ day, n: 0 });
      days.at(-1).n++;
    });
    const el = this.shadowRoot.getElementById('days');
    el.style.gridTemplateColumns = days.map(x => x.n + 'fr').join(' ');
    el.innerHTML = days.map(x =>
      `<span>${new Date(x.day + 'T12:00:00').toLocaleDateString('en-US',
        { weekday: 'short', day: 'numeric' })}</span>`).join('');

    this._bind();
  }

  _bind() {
    const d = this._d, n = d.times.length;
    const cursors = [...this.shadowRoot.querySelectorAll('.cursor')];
    this.shadowRoot.querySelectorAll('.hit').forEach(hit => {
      const move = e => {
        const r = hit.getBoundingClientRect();
        const i = Math.max(0, Math.min(n - 1, Math.round((e.clientX - r.left) / r.width * (n - 1))));
        cursors.forEach(c => { c.style.left = (i / (n - 1) * 100) + '%'; c.style.opacity = '.55'; });
        this._show(e, i, hit.dataset.spot);
      };
      hit.addEventListener('mousemove', move);
      hit.addEventListener('click', move);
      hit.addEventListener('mouseleave', () => {
        cursors.forEach(c => c.style.opacity = '0');
        this._tip.classList.remove('on');
      });
    });
  }

  _show(e, i, spotId) {
    const d = this._d;
    const sw = d.conditions.swell[i], td = d.conditions.tide[i];
    const t = new Date(d.times[i]);
    const line = (k, v) => `<div><span class="k">${k}</span>${v}</div>`;
    let html = `<b>${t.toLocaleString('en-US',
      { weekday: 'short', hour: 'numeric', hour12: true })}</b><br>`;

    if (spotId) {
      const c = d.scores[spotId][i];
      const sp = d.spots.find(s => s.id === spotId);
      const wind = d.conditions.wind[REGION(spotId)][i];
      html += `<div style="margin:3px 0 5px">${sp.name} — <b>${c.s === null ? 'no data' : c.s + '/100'}</b></div>`;
      if (c.s !== null) {
        html += line('surf', `${c.hEff} ft @ ${c.tEff}s from ${c.dEff}°`);
        html += line('limit', LIMIT_LABEL[c.limiting]);
        if (wind) html += line('wind', `${wind.spd} kt from ${wind.dir}°`);
        if (c.caution) html += `<div style="color:var(--warn);margin-top:4px">⚠ ${c.caution}</div>`;
      } else {
        html += line('missing', (c.missing || []).join(', '));
      }
    } else {
      if (sw) html += line('swell', `${sw.h} ft @ ${sw.t}s from ${sw.d}°`);
      if (td) html += line('tide', `${td.ft} ft, ${td.stage}`);
      const w = d.conditions.wind.matunuck[i];
      if (w) html += line('wind', `${w.spd} kt from ${w.dir}°`);
    }

    this._tip.innerHTML = html;
    this._tip.classList.add('on');
    let x = e.clientX + 14, y = e.clientY + 14;
    if (x + 230 > innerWidth) x = e.clientX - 230;
    if (y + 150 > innerHeight) y = e.clientY - 150;
    this._tip.style.left = x + 'px';
    this._tip.style.top = y + 'px';
  }
}
customElements.define('surf-sparkstack', SurfSparkStack);
</script>
</body>
</html>
